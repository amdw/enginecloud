name: Python build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pylint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pylint
        run: pip install pylint

      - name: Run pylint
        run: pylint --rcfile=pylintrc $(find . -name "*.py" -type f)
